<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    background:radial-gradient(120% 90% at 50% -10%, #2a6b4f 0%, #18402f 45%, #0e2a1f 100%);
    color:#fff8e9;-webkit-user-select:none;user-select:none;touch-action:none;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}
  .btn{cursor:pointer;border:none;font-family:inherit;font-weight:600;border-radius:999px;padding:14px 26px;font-size:17px;color:#2a160a;
    background:linear-gradient(180deg,#ffe7ac,#ffc24d);box-shadow:0 6px 22px rgba(255,170,50,.4),inset 0 1px 0 rgba(255,255,255,.7);
    transition:transform .1s ease, box-shadow .1s ease, opacity .15s;}
  .btn:active{transform:translateY(2px) scale(.985);}
  .btn:disabled{opacity:.35;filter:grayscale(.4);}
  .btn.ghost{background:rgba(255,255,255,.08);color:#fff8e9;box-shadow:inset 0 0 0 1.5px rgba(255,214,110,.5);}
  .btn.green{background:linear-gradient(180deg,#a7e8a0,#5cb85c);color:#10331a;}
  .btn.red{background:linear-gradient(180deg,#ff9b8a,#e2543a);color:#fff;}
  .btn.purple{background:linear-gradient(180deg,#d9b3ff,#9b5cff);color:#fff;}

  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:34px 26px;gap:18px;z-index:20;}
  .screen.hidden{display:none;}
  #home{background:radial-gradient(130% 90% at 50% 20%, rgba(43,107,79,.6), rgba(8,22,16,.96));}
  .logo-eyebrow{font-family:ui-monospace,Menlo,monospace;letter-spacing:.42em;font-size:12px;text-transform:uppercase;color:#ffd66e;opacity:.85;}
  .logo{font-size:clamp(40px,13vw,68px);line-height:.92;font-weight:600;background:linear-gradient(180deg,#fff6df,#ffd166 55%,#e89a2c);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 3px 16px rgba(255,180,70,.4));}
  .logo small{display:block;font-size:.32em;letter-spacing:.32em;color:#9fe6c4;-webkit-text-fill-color:#9fe6c4;margin-top:10px;font-family:ui-monospace,monospace;}
  .bread-emoji{font-size:54px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.4));}
  #home .menu{display:flex;flex-direction:column;gap:14px;width:min(340px,86vw);margin-top:6px;}
  .mode-btn{display:flex;align-items:center;gap:14px;text-align:left;justify-content:flex-start;padding:16px 20px;font-size:17px;}
  .mode-btn .ic{font-size:26px;}
  .mode-btn .sub{display:block;font-size:12.5px;font-weight:400;opacity:.7;margin-top:2px;font-family:ui-monospace,monospace;color:#2a160a;}
  .rules-link{margin-top:6px;font-size:13px;color:#bfe9d2;text-decoration:underline;text-underline-offset:3px;cursor:pointer;opacity:.85;}

  #handoff{background:#06120d;}
  #handoff .pass-card{font-size:60px;margin-bottom:4px;}
  #handoff h2{font-size:30px;font-weight:600;}
  #handoff p{opacity:.7;font-size:14.5px;max-width:26ch;}

  #board{position:absolute;inset:0;display:flex;flex-direction:column;z-index:5;}
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:calc(env(safe-area-inset-top) + 10px) 16px 6px;font-size:13px;}
  .opp{display:flex;align-items:center;gap:8px;}
  .opp .av{width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:18px;background:rgba(255,255,255,.1);box-shadow:inset 0 0 0 1.5px rgba(255,214,110,.4);}
  .opp .cnt{font-family:ui-monospace,monospace;font-size:12px;opacity:.85;}
  .tb-right{display:flex;gap:8px;align-items:center;}
  .menu-x{font-family:ui-monospace,monospace;font-size:13px;opacity:.7;cursor:pointer;border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:5px 9px;}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;position:relative;}
  .felt{position:absolute;inset:16px;border-radius:30px;background:radial-gradient(120% 100% at 50% 30%, #2f7a59, #1c4734 70%, #143527);box-shadow:inset 0 0 0 2px rgba(255,214,110,.25), inset 0 0 60px rgba(0,0,0,.35);}
  .piles{position:relative;display:flex;align-items:center;gap:24px;z-index:2;}
  .pile-label{position:absolute;top:-20px;left:0;right:0;text-align:center;font-size:10px;letter-spacing:.18em;text-transform:uppercase;font-family:ui-monospace,monospace;opacity:.6;}
  .deck-pile{position:relative;cursor:pointer;}
  .deck-count{position:absolute;inset:0;display:grid;place-items:center;font-size:13px;font-family:ui-monospace,monospace;color:#fff;text-shadow:0 1px 3px #000;}
  .discard-stack{position:relative;}
  .banner{min-height:22px;font-size:14.5px;text-align:center;padding:0 18px;z-index:2;color:#ffe9b8;text-shadow:0 1px 4px rgba(0,0,0,.5);max-width:92vw;}
  .wish-tag{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;background:rgba(0,0,0,.3);padding:3px 11px;border-radius:999px;z-index:2;}
  .handzone{padding:4px 0 calc(env(safe-area-inset-bottom) + 8px);}
  .turn-name{text-align:center;font-size:13px;letter-spacing:.05em;opacity:.8;margin-bottom:3px;}
  .actionbar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:0 12px 6px;min-height:10px;}
  .actionbar .btn{padding:10px 16px;font-size:14px;}
  .bb-btn{animation:pulse 1s ease-in-out infinite;}
  .bb-btn.butter{background:linear-gradient(180deg,#ffe9a8,#f2c14e);}
  .bb-btn.brot{background:linear-gradient(180deg,#f0c894,#c98a44);color:#fff;}
  @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 6px 22px rgba(255,170,50,.4);}50%{transform:scale(1.06);box-shadow:0 8px 30px rgba(255,200,90,.7);}}
  .hand{display:flex;overflow-x:auto;overflow-y:visible;padding:18px 16px 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .hand::-webkit-scrollbar{display:none;}
  .hand .slot{flex:0 0 auto;margin-left:-26px;position:relative;transition:transform .15s ease;}
  .hand .slot:first-child{margin-left:0;}
  .slot.lift{transform:translateY(-16px);}
  .slot .order{position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:#ffd66e;color:#2a160a;font-size:12px;font-weight:700;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;box-shadow:0 2px 6px rgba(0,0,0,.4);z-index:4;}
  .card{width:84px;height:120px;border-radius:13px;position:relative;flex:0 0 auto;background:linear-gradient(160deg,#f6dca0,#e7bd71 55%,#d8a655);box-shadow:0 5px 14px rgba(0,0,0,.4), inset 0 0 0 2px #b9863c, inset 0 0 0 4px rgba(255,255,255,.35);overflow:hidden;cursor:pointer;}
  .card .topping{position:absolute;top:9px;left:9px;right:9px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:inset 0 -2px 4px rgba(0,0,0,.15);}
  .card .rank{position:absolute;top:42px;left:0;right:0;text-align:center;font-size:34px;font-weight:700;color:#5a3410;text-shadow:0 1px 0 rgba(255,255,255,.4);font-family:Georgia,serif;}
  .card .corner{position:absolute;font-size:12px;font-weight:700;color:#7a4a1c;font-family:Georgia,serif;}
  .card .corner.tl{top:4px;left:6px;} .card .corner.br{bottom:4px;right:6px;transform:rotate(180deg);}
  .card .badge{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:10px;font-family:ui-monospace,monospace;color:#3c2208;font-weight:700;text-transform:uppercase;}
  .card.playable{box-shadow:0 0 0 2px #ffd66e,0 6px 18px rgba(255,200,80,.6),inset 0 0 0 2px #b9863c, inset 0 0 0 4px rgba(255,255,255,.4);}
  .card.playable:active{transform:translateY(-10px);}
  .card.selected{box-shadow:0 0 0 3px #6cf,0 6px 18px rgba(90,200,255,.6),inset 0 0 0 2px #b9863c;}
  .card.dim{filter:brightness(.78) saturate(.7);}
  .discard-stack .card.pop{animation:pop .26s ease;}
  @keyframes pop{0%{transform:scale(.55) rotate(-7deg);opacity:.5;}60%{transform:scale(1.08) rotate(2deg);}100%{transform:scale(1) rotate(0);opacity:1;}}
  .card-back{background:repeating-linear-gradient(45deg,#7a4a1c 0 9px,#8c5722 9px 18px);box-shadow:0 5px 14px rgba(0,0,0,.4),inset 0 0 0 3px #ffd66e,inset 0 0 0 5px #6b3f17;border-radius:13px;display:grid;place-items:center;}
  .card-back .seal{width:46px;height:46px;border-radius:50%;background:radial-gradient(#ffe6a8,#d89a3c);display:grid;place-items:center;font-size:24px;box-shadow:0 0 0 3px #6b3f17;}
  .overlay{position:absolute;inset:0;background:rgba(6,18,13,.94);z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;}
  .overlay.hidden{display:none;}
  .overlay h3{font-size:21px;text-align:center;}
  .overlay p{font-size:18px;max-width:26ch;text-align:center;line-height:1.4;}
  .wish-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .wish-opt{width:120px;height:74px;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:13px;font-weight:600;color:#2a160a;cursor:pointer;box-shadow:0 4px 14px rgba(0,0,0,.4),inset 0 0 0 2px rgba(255,255,255,.4);}
  .wish-opt .e{font-size:26px;}
  #flash{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:24;}
  #flashBig{font-size:clamp(42px,16vw,96px);font-weight:700;opacity:0;text-shadow:0 4px 24px rgba(0,0,0,.6);}
  .flash-anim{animation:flashpop 1.1s ease forwards;}
  @keyframes flashpop{0%{opacity:0;transform:scale(.5) rotate(-6deg);}18%{opacity:1;transform:scale(1.08) rotate(2deg);}68%{opacity:1;transform:scale(1) rotate(0);}100%{opacity:0;transform:scale(1.12);}}
  .shake{animation:shake .42s;}

  .disco::after{content:"";position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 32% 28%, rgba(255,255,255,.9), transparent 38%);}

  @keyframes spin{to{transform:rotate(360deg);}}
  .winners{display:flex;gap:6px;font-size:50px;margin:2px 0;}

  .winners span:nth-child(2){animation-delay:.12s;} .winners span:nth-child(3){animation-delay:.24s;} .winners span:nth-child(4){animation-delay:.36s;}

  #win h1{font-size:clamp(28px,9vw,44px);font-weight:600;background:linear-gradient(180deg,#fff,#ffd166);-webkit-background-clip:text;background-clip:text;color:transparent;}

<script>
(() => {
"use strict";
const SUITS={
  marm:{name:"Marmelade",color:"#d6455b",c2:"#a8324a",e:"🍓"},
  kaese:{name:"Käse",color:"#e8a93a",c2:"#c4872a",e:"🧀"},
  gurke:{name:"Gurke",color:"#5fa84e",c2:"#3f7e36",e:"🥒"},
  speck:{name:"Speck",color:"#c8657a",c2:"#9c4a5e",e:"🥓"},
};
const SUIT_KEYS=Object.keys(SUITS);
const RANK_ORDER=["6","7","8","9","10","B","D","K","A"];
const SPECIAL={"6":"+1 ziehen","7":"+2 ziehen","8":"nochmal","B":"wunsch","A":"klauen"};
const $=id=>document.getElementById(id);
let G=null,lastTopId=null;

/* ---------- Sound ---------- */
let AC=null,soundOn=true;
function ac(){if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}if(AC&&AC.state==="suspended")AC.resume();return AC;}
function beep(freq,dur,type="sine",vol=0.05){if(!soundOn)return;const c=ac();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=freq;o.connect(g);g.connect(c.destination);const t=c.currentTime;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur);}
const sfxPlay=()=>beep(430,0.07,"triangle",0.045);
const sfxDraw=()=>beep(230,0.11,"sine",0.05);
const sfxBomb=()=>{beep(95,0.4,"sawtooth",0.12);setTimeout(()=>beep(58,0.5,"sawtooth",0.1),60);};
const sfxTrick=()=>[660,880,990].forEach((f,i)=>setTimeout(()=>beep(f,0.12,"sine",0.05),i*70));
const sfxBB=()=>beep(720,0.12,"square",0.04);
const sfxWin=()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.26,"triangle",0.07),i*120));

/* ---------- Effekte ---------- */
function flashBig(text,color){const f=$("flashBig");f.textContent=text;f.style.color=color||"#fff";f.classList.remove("flash-anim");void f.offsetWidth;f.classList.add("flash-anim");}
function shake(){const b=$("board");b.classList.remove("shake");void b.offsetWidth;b.classList.add("shake");}

/* ---------- Deck ---------- */
function buildDeck(){const d=[];for(const s of SUIT_KEYS)for(const r of RANK_ORDER)d.push({suit:s,rank:r,id:s+r+Math.random().toString(36).slice(2,6)});return shuffle(d);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function newGame(mode){
  ac();
  const deck=buildDeck();
  const players=[
    {name:mode==="pc"?"Du":"Spieler 1",hand:[],isPC:false,av:"🧑"},
    {name:mode==="pc"?"Computer":"Spieler 2",hand:[],isPC:mode==="pc",av:mode==="pc"?"🤖":"🧑‍🦱"},
  ];
  for(let i=0;i<7;i++){players[0].hand.push(deck.pop());players[1].hand.push(deck.pop());}
  let first;while(true){first=deck.pop();if(["6","7","8","B"].includes(first.rank)&&deck.length>10)deck.unshift(first);else break;}
  G={mode,deck,discard:[first],players,cur:0,activeSuit:first.suit,wish:null,pending:0,chain:null,streetPenalty:0,
     mustCover:false,drewThisTurn:false,turnComplete:false,butterArmed:false,brotArmed:false,curPlayed:[],curDrew:0,curNote:"",lastMove:null,over:false};
  lastTopId=null;showScreen(null);
  if(mode==="2p"){startHandoff();}else{$("board").style.display="flex";renderAll();banner("Du beginnst. Leg los! 🍞");}
}

/* ---------- Regeln ---------- */
const topCard=()=>G.discard[G.discard.length-1];
const effectiveSuit=()=>G.wish||G.activeSuit;
function owedState(){
  if(G.mustCover)return 'normal';
  if(G.chain==='bomb'&&G.pending>0)return 'bombchain';
  if(G.streetPenalty>0)return 'buried';
  if(G.pending>0)return 'chain';
  return 'normal';
}
function canPlay(card){
  if(G.mustCover){const top=topCard();if(card.rank==="B")return true;return card.suit===effectiveSuit()||card.rank===top.rank;}
  if(G.streetPenalty>0)return false;
  if(G.chain==='bomb')return false;
  const top=topCard();
  if(G.pending>0){if(G.chain==="7")return card.rank==="7"||card.rank==="B";if(G.chain==="6")return card.rank==="6";return false;}
  if(card.rank==="B")return true;
  return card.suit===effectiveSuit()||card.rank===top.rank;
}
const hasAnyPlay=p=>p.hand.some(canPlay);
function startLegal(card){if(G.pending>0||G.streetPenalty>0)return false;if(card.rank==="B")return true;return card.suit===effectiveSuit()||card.rank===topCard().rank;}
function streetCheck(seq){
  if(seq.length<4)return{ok:false,msg:"Mindestens 4 Karten für eine Strasse."};
  if(seq.filter(c=>c.rank==="B").length>1)return{ok:false,msg:"Maximal 1 Bube pro Strasse."};
  const nb=seq.filter(c=>c.rank!=="B");if(!nb.length)return{ok:false,msg:"Ungültig."};
  const suit=nb[0].suit;if(nb.some(c=>c.suit!==suit))return{ok:false,msg:"Alle Karten müssen gleichen Belag haben."};
  for(const d of[1,-1]){let i0=-1,p0=0;for(let i=0;i<seq.length;i++){if(seq[i].rank!=="B"){i0=i;p0=RANK_ORDER.indexOf(seq[i].rank);break;}}
    let good=true;const used=new Set();
    for(let j=0;j<seq.length;j++){const pos=((p0+d*(j-i0))%9+9)%9;if(used.has(pos)){good=false;break;}used.add(pos);if(seq[j].rank!=="B"&&RANK_ORDER.indexOf(seq[j].rank)!==pos){good=false;break;}}
    if(good)return{ok:true};}
  return{ok:false,msg:"Karten müssen lückenlos fortlaufen (Bube an die Lücke tippen)."};
}
function bombCheck(seq){
  if(seq.length!==4)return{ok:false,msg:"Eine Bombe braucht genau 4 Karten."};
  if(seq.filter(c=>c.rank==="B").length>1)return{ok:false,msg:"Maximal 1 Bube in einer Bombe."};
  const nb=seq.filter(c=>c.rank!=="B");if(!nb.length)return{ok:false,msg:"Ungültig."};
  const rank=nb[0].rank;if(nb.some(c=>c.rank!==rank))return{ok:false,msg:"Alle 4 Karten müssen den gleichen Wert haben."};
  return{ok:true,rank};
}
function findBomb(player){
  const byRank={};player.hand.forEach(c=>{if(c.rank!=="B"){(byRank[c.rank]=byRank[c.rank]||[]).push(c);}});
  const bube=player.hand.find(c=>c.rank==="B");let chosen=null;
  for(const r in byRank){if(byRank[r].length>=4){chosen=byRank[r].slice(0,4);break;}}
  if(!chosen&&bube){for(const r in byRank){if(byRank[r].length===3){chosen=byRank[r].slice(0,3).concat([bube]);break;}}}
  if(!chosen)return null;
  const ids=new Set(chosen.map(c=>c.id));const sc={};player.hand.forEach(c=>{if(!ids.has(c.id))sc[c.suit]=(sc[c.suit]||0)+1;});
  chosen.sort((a,b)=>(sc[a.suit]||0)-(sc[b.suit]||0));return chosen;
}
const hasBomb=p=>!!findBomb(p);
const bombDrawOf=r=>2+(r==="6"?1:r==="7"?2:0);
function orderBomb(cards,player){const ids=new Set(cards.map(c=>c.id));const sc={};player.hand.forEach(c=>{if(!ids.has(c.id))sc[c.suit]=(sc[c.suit]||0)+1;});return cards.slice().sort((a,b)=>(sc[a.suit]||0)-(sc[b.suit]||0));}
function findBombs(player){const bube=player.hand.find(c=>c.rank==="B");const byRank={};player.hand.forEach(c=>{if(c.rank!=="B")(byRank[c.rank]=byRank[c.rank]||[]).push(c);});const out=[];for(const r in byRank){if(byRank[r].length>=4)out.push(orderBomb(byRank[r].slice(0,4),player));else if(byRank[r].length===3&&bube)out.push(orderBomb(byRank[r].slice(0,3).concat([bube]),player));}return out;}
function findStreets(player){if(owedState()!=="normal"||G.mustCover)return [];const bubeAvail=player.hand.some(c=>c.rank==="B");const bube=player.hand.find(c=>c.rank==="B");const cand=[];for(const suit of SUIT_KEYS){const map={};player.hand.filter(c=>c.suit===suit&&c.rank!=="B").forEach(c=>{map[RANK_ORDER.indexOf(c.rank)]=c;});const real=p=>map[((p%9)+9)%9];for(let len=9;len>=4;len--){for(let s=0;s<9;s++){const cards=[];let gaps=0,gapAtEnd=false;for(let k=0;k<len;k++){const pos=((s+k)%9+9)%9;const rc=real(pos);if(rc){cards.push(rc);}else{gaps++;cards.push(null);if(k===0||k===len-1)gapAtEnd=true;}}if(gaps>1)continue;if(gaps===1&&(!bubeAvail||gapAtEnd))continue;if(!cards[0]||!cards[len-1])continue;const seq=cards.map(c=>c||bube);const asc=seq,desc=seq.slice().reverse();if(startLegal(asc[0]))cand.push(asc);if(startLegal(desc[0]))cand.push(desc);}}}return dedupeStreets(cand);}
function dedupeStreets(cand){const byKey={};for(const seq of cand){const ids=seq.map(c=>c.id).slice().sort().join(",");(byKey[ids]=byKey[ids]||[]).push(seq);}let sets=Object.entries(byKey).map(([ids,seqs])=>({ids:ids.split(","),seqs}));sets=sets.filter(a=>!sets.some(b=>b!==a&&b.ids.length>a.ids.length&&a.ids.every(id=>b.ids.includes(id))));const out=[];const seen=new Set();for(const set of sets){for(const seq of set.seqs){const k=seq.map(c=>c.id).join(">");if(seen.has(k))continue;seen.add(k);out.push(seq);}}return out.slice(0,6);}
function miniCard(card,w,h){const wrap=document.createElement("div");wrap.style.cssText="width:"+w+"px;height:"+h+"px;flex:0 0 auto;overflow:hidden;";const el=cardEl(card,true);el.style.transformOrigin="top left";el.style.transform="scale("+(w/84)+")";wrap.appendChild(el);return wrap;}
function openComboChooser(combos,type){const ov=$("chooserOverlay");ov.classList.remove("hidden");$("chooserTitle").textContent=type==="street"?"Welche Strasse spielen?":"Welche Bombe zünden?";const list=$("chooserList");list.innerHTML="";const me=G.players[G.cur];combos.forEach(combo=>{const row=document.createElement("div");row.className="combo-row";const cc=document.createElement("div");cc.className="combo-cards";combo.forEach(c=>cc.appendChild(miniCard(c,44,63)));const go=document.createElement("div");go.className="combo-go";const rem=me.hand.length-combo.length;go.textContent=rem===0?"🍞 Brot!":rem===1?"🧈 Butter!":"Spielen ▶";row.append(cc,go);row.addEventListener("click",()=>playCombo(combo,type));list.appendChild(row);});}
function closeChooser(){$("chooserOverlay").classList.add("hidden");}
function playCombo(combo,type){closeChooser();const me=G.players[G.cur];const rem=me.hand.length-combo.length;if(rem===1)G.butterArmed=true;else if(rem===0)G.brotArmed=true;if(type==="street")playStreet(combo,me,false);else playBomb(combo,me,false);}
function recordTurnEnd(){if(!G)return;G.lastMove={name:G.players[G.cur].name,cards:(G.curPlayed||[]).slice(),drew:G.curDrew||0,note:G.curNote||""};}
function showRecap(cb){const m=G.lastMove;if(!m||(m.cards.length===0&&m.drew===0)){cb();return;}$("recapTitle").textContent="Letzter Zug: "+m.name;const cont=$("recapCards");cont.innerHTML="";m.cards.slice(0,12).forEach(c=>cont.appendChild(miniCard(c,50,72)));let parts=[];if(m.note)parts.push(m.note);if(m.cards.length)parts.push(m.cards.length+" Karte"+(m.cards.length>1?"n":"")+" gelegt");if(m.drew)parts.push(m.drew+" gezogen");if(!m.cards.length&&!m.drew)parts.push("gepasst");$("recapText").textContent=parts.join(" · ")+".";const ov=$("recapOverlay");ov.classList.remove("hidden");$("recapBtn").onclick=()=>{ov.classList.add("hidden");cb();};}

function canTrick(me){
  if(owedState()!=='normal'||G.mustCover)return false;
  if(!me.hand.some(c=>c.rank==="B"))return false;
  if(!me.hand.some(c=>c.rank==="A"))return false;
  return me.hand.some(c=>c.rank==="8"&&canPlay(c));
}
const trickAceSuits=me=>[...new Set(me.hand.filter(c=>c.rank==="A").map(c=>c.suit))];

/* ---------- Render ---------- */
function cardEl(card,faceUp=true){
  const el=document.createElement("div");
  if(!faceUp){el.className="card card-back";const s=document.createElement("div");s.className="seal";s.textContent="🍞";el.appendChild(s);return el;}
  el.className="card";const su=SUITS[card.suit];
  const top=document.createElement("div");top.className="topping";top.style.background=`linear-gradient(180deg,${su.color},${su.c2})`;top.textContent=su.e;
  const rank=document.createElement("div");rank.className="rank";rank.textContent=card.rank;
  const tl=document.createElement("div");tl.className="corner tl";tl.textContent=card.rank;
  const br=document.createElement("div");br.className="corner br";br.textContent=card.rank;
  el.append(top,rank,tl,br);
  if(SPECIAL[card.rank]){const b=document.createElement("div");b.className="badge";b.textContent=SPECIAL[card.rank];el.appendChild(b);}
  return el;
}
function renderDiscard(){
  const p=$("discardPile");p.querySelectorAll(".card").forEach(n=>n.remove());
  const top=topCard();const c=cardEl(top,true);
  if(top.id!==lastTopId){c.classList.add("pop");lastTopId=top.id;}
  p.appendChild(c);
}
function renderCounts(){
  $("deckCount").textContent=G.deck.length;
  const view=G.mode==="pc"?0:G.cur;const opp=G.players[1-view];
  $("oppAv").textContent=opp.av;$("oppName").textContent=opp.name;$("oppCount").textContent=opp.hand.length;
  if(G.wish){const s=SUITS[G.wish];$("wishTag").style.display="inline-flex";$("wishTag").innerHTML=`Wunsch: ${s.e} ${s.name}`;}else $("wishTag").style.display="none";
}
function renderHand(){
  const hand=$("hand");hand.innerHTML="";
  const view=G.mode==="pc"?0:G.cur;const me=G.players[view];
  const interactive=(G.cur===view)&&!me.isPC&&!G.turnComplete&&!G.over;
  me.hand.forEach((card,idx)=>{
    const slot=document.createElement("div");slot.className="slot";const el=cardEl(card,true);
    if(interactive&&G.buildMode){
      const order=G.buildSel.findIndex(c=>c.id===card.id);
      if(order>=0){slot.classList.add("lift");el.classList.add("selected");const o=document.createElement("div");o.className="order";o.textContent=order+1;slot.appendChild(o);}
      el.addEventListener("click",()=>toggleBuildCard(idx));
    }else if(interactive){
      if(canPlay(card)){el.classList.add("playable");el.addEventListener("click",()=>humanPlay(idx));}else el.classList.add("dim");
    }
    slot.appendChild(el);hand.appendChild(slot);
  });
}
function mkBtn(label,fn,extra=""){const b=document.createElement("button");b.className="btn"+(extra?" "+extra:"");b.textContent=label;b.addEventListener("click",fn);return b;}
function renderActions(){
  const bar=$("actionbar");bar.innerHTML="";const me=G.players[G.cur];
  if(me.isPC||G.over)return;
  if(G.turnComplete){if(G.mode==="2p")bar.appendChild(mkBtn("Zug beenden ➡",passTurn));return;}
  if(G.buildMode){
    const rem=me.hand.length-G.buildSel.length;
    if(rem===1&&!G.butterArmed)bar.appendChild(mkBtn("🧈 Butter!",armButter,"bb-btn butter"));
    if(rem===0&&!G.brotArmed)bar.appendChild(mkBtn("🍞 Brot!",armBrot,"bb-btn brot"));
    if(G.buildMode==="street")bar.appendChild(mkBtn(`Strasse spielen ✓ (${G.buildSel.length})`,tryHumanStreet,"green"));
    else bar.appendChild(mkBtn(`Bombe zünden 💥 (${G.buildSel.length}/4)`,tryHumanBomb,"red"));
    bar.appendChild(mkBtn("Abbrechen",exitBuild,"ghost"));return;
  }
  if(me.hand.length===2&&!G.butterArmed)bar.appendChild(mkBtn("🧈 Butter!",armButter,"bb-btn butter"));
  if(me.hand.length===1&&!G.brotArmed)bar.appendChild(mkBtn("🍞 Brot!",armBrot,"bb-btn brot"));
  const _bm=findBombs(me);if(_bm.length)bar.appendChild(mkBtn("💣 Bombe",()=>openComboChooser(_bm,"bomb"),"ghost"));
  const st=owedState();
  if(st==='bombchain'||st==='chain'){bar.appendChild(mkBtn(`Ziehen (${G.pending})`,humanTakePending));}
  else if(st==='buried'){bar.appendChild(mkBtn(`Vergraben ziehen (${G.streetPenalty})`,humanTakeBuried));}
  else{
    if(canTrick(me))bar.appendChild(mkBtn("🎩 Trick",startTrick,"purple"));
    if(!G.drewThisTurn)bar.appendChild(mkBtn("Karte ziehen",humanDraw));
    const _stt=findStreets(me);if(_stt.length)bar.appendChild(mkBtn("🛣️ Strasse",()=>openComboChooser(_stt,"street"),"ghost"));
    if(G.drewThisTurn)bar.appendChild(mkBtn(hasAnyPlay(me)?"Passen ➡":"Fertig ➡",completeTurn,"ghost"));
  }
}
function renderTurnName(){const me=G.players[G.cur];$("turnName").textContent=G.mode==="pc"?(me.isPC?"":"Du bist dran"):(me.isPC?"":`${me.name} ist dran`);}
function renderAll(){renderDiscard();renderCounts();renderHand();renderActions();renderTurnName();}
function banner(t){$("banner").innerHTML=t;}
function startBanner(){
  const me=G.players[G.cur];if(me.isPC){banner("Computer ist dran…");return;}
  const st=owedState();
  if(st==='bombchain')banner(`💣 Bombe liegt (+${G.pending})! Kontere mit Bombe oder ziehe.`);
  else if(st==='buried')banner(`Vergrabene Sonderkarten: +${G.streetPenalty}. Ziehen oder Bombe.`);
  else if(st==='chain')banner(`Ziehzwang +${G.pending}. Kontern, Bombe oder ziehen.`);
  else banner(G.mode==="pc"?"Du bist dran.":`${me.name}: leg eine Karte oder zieh.`);
}
function armButter(){G.butterArmed=true;flashBig("🧈 BUTTER!","#ffd66e");sfxBB();banner('"Butter!" gerufen 🧈');renderActions();}
function armBrot(){G.brotArmed=true;flashBig("🍞 BROT!","#f0c894");sfxBB();banner('"Brot!" – jetzt zum Sieg!');renderActions();}
function enterStreet(){G.buildMode="street";G.buildSel=[];banner("Strasse: Karten in Reihenfolge tippen (Bube an die Lücke).");renderAll();}
function enterBomb(){G.buildMode="bomb";G.buildSel=[];banner("Bombe: 4 gleiche Werte tippen (1 Bube ok). Letzte = oben = Belag.");renderAll();}
function exitBuild(){G.buildMode=null;G.buildSel=[];banner("");renderAll();}
function toggleBuildCard(idx){const card=G.players[G.cur].hand[idx];const i=G.buildSel.findIndex(c=>c.id===card.id);if(i>=0)G.buildSel.splice(i,1);else G.buildSel.push(card);renderAll();}

/* ---------- Ziehen ---------- */
function drawCards(p,n){for(let i=0;i<n;i++){if(G.deck.length===0){if(G.discard.length<=1)break;const t=G.discard.pop();G.deck=shuffle(G.discard);G.discard=[t];}p.hand.push(G.deck.pop());}}
function humanDraw(){sfxDraw();G.curDrew=(G.curDrew||0)+1;drawCards(G.players[G.cur],1);G.drewThisTurn=true;banner("Du hast eine Karte gezogen.");renderAll();}
function humanTakePending(){sfxDraw();const me=G.players[G.cur];const n=G.pending;G.curDrew=(G.curDrew||0)+n;drawCards(me,n);G.pending=0;G.chain=null;G.drewThisTurn=true;banner(`Du ziehst ${n} – jetzt normal weiterspielen.`);renderAll();}
function humanTakeBuried(){sfxDraw();const me=G.players[G.cur];const n=G.streetPenalty;G.curDrew=(G.curDrew||0)+n;drawCards(me,n);G.streetPenalty=0;banner(`Vergraben gezogen: ${n}. Jetzt normal dran.`);renderAll();}

/* ---------- Einzelkarte ---------- */
function humanPlay(idx){
  const me=G.players[G.cur];const card=me.hand[idx];if(!canPlay(card))return;
  if(me.hand.length===2&&!G.butterArmed){banner('Tippe zuerst 🧈 Butter!');return;}
  if(me.hand.length===1&&!G.brotArmed){banner('Tippe zuerst 🍞 Brot!');return;}
  me.hand.splice(idx,1);G.discard.push(card);G.wish=null;G.curPlayed.push({suit:card.suit,rank:card.rank});sfxPlay();applyEffect(card,me,false);
}
function applyEffect(card,player,isPC){
  G.activeSuit=card.rank==="B"?G.activeSuit:card.suit;
  if(card.rank==="B"){
    if(G.chain==="7"&&G.pending>0)G.pending+=2;
    if(isPC){chooseWishPC(player);finishOrCover(card,player,true);}
    else openWish(G.chain==="7"&&G.pending>0?"Bube als 7 – welcher Belag?":"Bube – welcher Belag?",()=>finishOrCover(card,player,false));
    return;
  }
  if(card.rank==="6"){G.pending+=1;G.chain="6";}else if(card.rank==="7"){G.pending+=2;G.chain="7";}
  if(card.rank==="A"&&G.pending===0&&G.discard.length>=2&&!isPC){const u=G.discard[G.discard.length-2];if(u.rank!=="A"&&u.suit===card.suit){openAce(G.discard.length-2,()=>finishOrCover(card,player,false));return;}}
  finishOrCover(card,player,isPC);
}
function finishOrCover(card,player,isPC){
  if(card.rank==="8"&&player.hand.length>0){
    G.mustCover=true;G.turnComplete=false;G.drewThisTurn=false;
    if(isPC){renderAll();setTimeout(pcStep,700);}else{banner("Acht gedeckt – du bist nochmal dran! 🔁");renderAll();}
    return;
  }
  G.mustCover=false;resolveEnd(player,isPC);
}

/* ---------- Strasse ---------- */
function tryHumanStreet(){
  const me=G.players[G.cur];const seq=G.buildSel.slice();
  const chk=streetCheck(seq);if(!chk.ok){banner("⚠️ "+chk.msg);return;}
  if(!startLegal(seq[0])){banner("⚠️ Die erste Karte muss auf die offene Karte passen.");return;}
  const rem=me.hand.length-seq.length;
  if(rem===1&&!G.butterArmed){banner('Tippe zuerst 🧈 Butter!');return;}
  if(rem===0&&!G.brotArmed){banner('Tippe zuerst 🍞 Brot!');return;}
  G.buildMode=null;G.buildSel=[];playStreet(seq,me,false);
}
function playStreet(seq,player,isPC){
  seq.forEach(card=>{const i=player.hand.findIndex(c=>c.id===card.id);if(i>=0)player.hand.splice(i,1);});
  seq.forEach(c=>G.discard.push(c));sfxPlay();
  let buried=0;for(let k=0;k<seq.length-1;k++){if(seq[k].rank==="6")buried+=1;else if(seq[k].rank==="7")buried+=2;}
  G.streetPenalty=buried;G.wish=null;G.pending=0;G.chain=null;
  const end=seq[seq.length-1];G.activeSuit=end.rank==="B"?G.activeSuit:end.suit;
  if(end.rank==="6"){G.pending=1;G.chain="6";}else if(end.rank==="7"){G.pending=2;G.chain="7";}
  seq.forEach(c=>G.curPlayed.push({suit:c.suit,rank:c.rank}));G.curNote="Strasse 🛣️";flashBig("🛣️ STRASSE!","#bfe9d2");
  let msg=`${player.name} legt eine Strasse (${seq.length})!`;if(buried>0)msg+=` Vergraben: +${buried}.`;
  banner(msg);renderDiscard();renderCounts();renderHand();
  if(end.rank==="8"&&player.hand.length>0){G.mustCover=true;G.turnComplete=false;G.drewThisTurn=false;
    if(isPC){renderAll();setTimeout(pcStep,750);}else{banner(msg+" Endet auf 8 – decken!");renderAll();}return;}
  if(end.rank==="B"&&player.hand.length>0){if(isPC){chooseWishPC(player);endStreet(player,isPC);}else openWish("Strasse endet auf Bube – Belag?",()=>endStreet(player,false));return;}
  if(end.rank==="A"&&player.hand.length>0&&G.discard.length>=2&&!isPC){const u=G.discard[G.discard.length-2];if(u.rank!=="A"&&u.suit===end.suit){openAce(G.discard.length-2,()=>endStreet(player,false));return;}}
  endStreet(player,isPC);
}
function endStreet(player,isPC){resolveEnd(player,isPC);}

/* ---------- Bombe ---------- */
function tryHumanBomb(){
  const me=G.players[G.cur];const seq=G.buildSel.slice();
  const chk=bombCheck(seq);if(!chk.ok){banner("⚠️ "+chk.msg);return;}
  const rem=me.hand.length-4;
  if(rem===1&&!G.butterArmed){banner('Tippe zuerst 🧈 Butter!');return;}
  if(rem===0&&!G.brotArmed){banner('Tippe zuerst 🍞 Brot!');return;}
  G.buildMode=null;G.buildSel=[];playBomb(seq,me,false);
}
function playBomb(seq,player,isPC){
  seq.forEach(card=>{const i=player.hand.findIndex(c=>c.id===card.id);if(i>=0)player.hand.splice(i,1);});
  seq.forEach(c=>G.discard.push(c));
  const rank=seq.find(c=>c.rank!=="B").rank;const bd=bombDrawOf(rank);
  let carried=0;if(G.streetPenalty>0)carried=0;else if(G.chain==="6"||G.chain==="7"||G.chain==="bomb")carried=G.pending;
  G.streetPenalty=0;G.pending=carried+bd;G.chain="bomb";G.wish=null;
  const top=seq[seq.length-1];
  seq.forEach(c=>G.curPlayed.push({suit:c.suit,rank:c.rank}));G.curNote="Bombe 💥";flashBig("💥 BOMBE!","#ff9b8a");shake();sfxBomb();
  banner(`${player.name} zündet eine ${rank==="B"?"":rank+"er-"}Bombe! Nächster: +${G.pending}.`);
  renderDiscard();renderCounts();renderHand();
  const after=()=>{
    if(rank==="8"&&player.hand.length>0){G.mustCover=true;G.turnComplete=false;G.drewThisTurn=false;
      if(isPC){renderAll();setTimeout(pcStep,750);}else{banner("8er-Bombe – decken (nochmal dran)!");renderAll();}return;}
    if(rank==="A"&&player.hand.length>0&&G.discard.length>=5&&!isPC){const u=G.discard[G.discard.length-5];if(u.rank!=="A"){openAce(G.discard.length-5,()=>resolveEnd(player,false));return;}}
    resolveEnd(player,isPC);
  };
  if(top.rank==="B"){if(isPC){chooseWishPC(player);after();}else openWish("Bombe endet auf Bube – Belag?",()=>after());}
  else{G.activeSuit=top.suit;after();}
}

/* ---------- Trick (8 → Bube → Ass) ---------- */
function startTrick(){
  const me=G.players[G.cur];const suits=trickAceSuits(me);
  if(suits.length===1)chooseTrick(suits[0]);else openTrickSuit(suits);
}
function openTrickSuit(suits){
  const ov=$("wishOverlay");ov.classList.remove("hidden");$("wishTitle").textContent="Trick: zu welchem Belag wechseln?";
  const grid=$("wishGrid");grid.innerHTML="";
  suits.forEach(k=>{const s=SUITS[k];const o=document.createElement("div");o.className="wish-opt";
    o.style.background=`linear-gradient(180deg,${s.color},${s.c2})`;o.innerHTML=`<div class="e">${s.e}</div><div>${s.name}</div>`;
    o.addEventListener("click",()=>{ov.classList.add("hidden");chooseTrick(k);});grid.appendChild(o);});
}
function chooseTrick(aceSuit){
  const me=G.players[G.cur];const rem=me.hand.length-2;
  if(rem===1&&!G.butterArmed){banner('Tippe zuerst 🧈 Butter!');return;}
  if(rem===0&&!G.brotArmed){banner('Tippe zuerst 🍞 Brot!');return;}
  doTrick(me,aceSuit,false);
}
function doTrick(player,aceSuit,isPC){
  const eight=player.hand.find(c=>c.rank==="8"&&canPlay(c));
  const bube=player.hand.find(c=>c.rank==="B");
  const ace=player.hand.find(c=>c.rank==="A"&&c.suit===aceSuit);
  if(!eight||!bube||!ace){if(!isPC)banner("Trick gerade nicht möglich.");return;}
  [eight,bube,ace].forEach(card=>{const i=player.hand.findIndex(c=>c.id===card.id);player.hand.splice(i,1);});
  G.discard.push(eight);G.discard.push(bube);G.discard.push(ace);
  G.discard.splice(G.discard.length-2,1); // Bube dank Ass wieder aufnehmen
  player.hand.push(bube);
  G.activeSuit=ace.suit;G.wish=null;G.pending=0;G.chain=null;G.mustCover=false;G.streetPenalty=0;
  G.curPlayed.push({suit:eight.suit,rank:eight.rank});G.curPlayed.push({suit:ace.suit,rank:ace.rank});G.curNote="Trick 🎩";flashBig("🎩 TRICK!","#d9b3ff");sfxTrick();
  const su=SUITS[aceSuit];
  banner(`🎩 ${player.name} wechselt zu ${su.e} ${su.name} und behält den Buben!`);
  renderDiscard();renderCounts();renderHand();
  resolveEnd(player,isPC);
}

/* ---------- Overlays ---------- */
function openWish(title,cb){
  const ov=$("wishOverlay");ov.classList.remove("hidden");$("wishTitle").textContent=title;
  const grid=$("wishGrid");grid.innerHTML="";
  SUIT_KEYS.forEach(k=>{const s=SUITS[k];const o=document.createElement("div");o.className="wish-opt";
    o.style.background=`linear-gradient(180deg,${s.color},${s.c2})`;o.innerHTML=`<div class="e">${s.e}</div><div>${s.name}</div>`;

}
function chooseWishPC(player){const c={marm:0,kaese:0,gurke:0,speck:0};player.hand.forEach(x=>c[x.suit]++);let b="marm",bv=-1;for(const k of SUIT_KEYS)if(c[k]>bv){bv=c[k];b=k;}G.wish=b;G.activeSuit=b;}
function openAce(underIdx,cb){
  const under=G.discard[underIdx];const ov=$("askOverlay");ov.classList.remove("hidden");const su=SUITS[under.suit];
  $("askText").innerHTML=`Karte darunter klauen?<br><b>${under.rank} ${su.e} ${su.name}</b>`;

  $("askYes").onclick=()=>{ov.classList.add("hidden");G.discard.splice(underIdx,1);G.players[G.cur].hand.push(under);banner(`Geklaut: ${under.rank} ${su.e}! 🤏`);cb();};
  $("askNo").onclick=()=>{ov.classList.add("hidden");cb();};
}

/* ---------- Zugwechsel ---------- */
function completeTurn(){G.turnComplete=true;G.mustCover=false;if(G.mode==="pc")passTurnImmediate();else renderAll();}
function passTurn(){recordTurnEnd();G.cur=1-G.cur;resetTurnFlags();startHandoff();}
function passTurnImmediate(){recordTurnEnd();G.cur=1-G.cur;resetTurnFlags();const me=G.players[G.cur];renderAll();startBanner();if(me.isPC)setTimeout(pcStep,850);}
function resetTurnFlags(){G.drewThisTurn=false;G.turnComplete=false;G.butterArmed=false;G.brotArmed=false;G.mustCover=false;G.curPlayed=[];G.curDrew=0;G.curNote="";}
function startHandoff(){$("board").style.display="none";$("handoffName").textContent=G.players[G.cur].name;showScreen("handoff");}
$("revealBtn").onclick=()=>{$("handoff").classList.add("hidden");renderAll();$("board").style.display="flex";showRecap(()=>startBanner());};

/* ---------- Sieg / Interrupt ---------- */
function resolveEnd(player,isPC){if(player.hand.length===0){attemptWin(player);return;}if(isPC)passTurnImmediate();else completeTurn();}
function attemptWin(player){
  const pIdx=G.players.indexOf(player),oIdx=1-pIdx,opp=G.players[oIdx];
  if(findBomb(opp)){if(opp.isPC)setTimeout(()=>doInterrupt(oIdx,pIdx),550);else showInterrupt(oIdx,pIdx);}
  else{G.over=true;setTimeout(()=>celebrate(player),350);}
}
function showInterrupt(bomberIdx,loserIdx){
  $("hand").innerHTML="";$("actionbar").innerHTML="";
  const ov=$("askOverlay");ov.classList.remove("hidden");
  $("askText").innerHTML=`⚠️ ${G.players[loserIdx].name} will gewinnen!<br>${G.players[bomberIdx].name}, du hast eine Bombe.`;
  $("askYes").textContent="💣 Bombe werfen!";$("askNo").textContent="Durchlassen";
  $("askYes").onclick=()=>{ov.classList.add("hidden");doInterrupt(bomberIdx,loserIdx);};
  $("askNo").onclick=()=>{ov.classList.add("hidden");G.over=true;celebrate(G.players[loserIdx]);};
}
function doInterrupt(bomberIdx,loserIdx){
  const bomber=G.players[bomberIdx],loser=G.players[loserIdx];const seq=findBomb(bomber);
  seq.forEach(card=>{const i=bomber.hand.findIndex(c=>c.id===card.id);if(i>=0)bomber.hand.splice(i,1);});
  seq.forEach(c=>G.discard.push(c));
  const rank=seq.find(c=>c.rank!=="B").rank;const bd=bombDrawOf(rank);drawCards(loser,bd);
  const top=seq[seq.length-1];if(top.rank==="B")chooseWishPC(bomber);else{G.activeSuit=top.suit;G.wish=null;}
  G.pending=0;G.chain=null;G.streetPenalty=0;G.over=false;G.cur=bomberIdx;resetTurnFlags();
  flashBig("💥 ABGEFANGEN!","#ff9b8a");shake();sfxBomb();
  banner(`💥 ${bomber.name} bombt ${loser.name}s Sieg weg! ${loser.name} zieht ${bd}.`);
  renderAll();if(bomber.isPC)setTimeout(pcStep,950);
}

/* ---------- PC ---------- */
function pcStep(){
  if(G.over)return;const pc=G.players[G.cur];const st=owedState();
  if(st==='bombchain'){
    if(findBomb(pc)){playBomb(findBomb(pc),pc,true);return;}
    sfxDraw();G.curDrew=(G.curDrew||0)+G.pending;drawCards(pc,G.pending);banner(`Computer zieht ${G.pending}.`);G.pending=0;G.chain=null;G.drewThisTurn=true;renderCounts();setTimeout(pcStep,650);return;
  }
  if(st==='buried'){
    if(G.streetPenalty>=3&&findBomb(pc)){playBomb(findBomb(pc),pc,true);return;}
    sfxDraw();const n=G.streetPenalty;G.curDrew=(G.curDrew||0)+n;drawCards(pc,n);G.streetPenalty=0;renderCounts();banner(`Computer zieht ${n} (vergraben).`);setTimeout(pcStep,650);return;
  }
  if(st==='chain'){
    const ctr=pc.hand.find(canPlay);if(ctr){pcPlay(pc,ctr);return;}
    if(findBomb(pc)&&G.pending>=4){playBomb(findBomb(pc),pc,true);return;}
    sfxDraw();G.curDrew=(G.curDrew||0)+G.pending;drawCards(pc,G.pending);banner(`Computer zieht ${G.pending}.`);G.pending=0;G.chain=null;G.drewThisTurn=true;renderCounts();setTimeout(pcStep,650);return;
  }
  if(!G.mustCover&&findBomb(pc)&&G.players[1-G.cur].hand.length<=2){playBomb(findBomb(pc),pc,true);return;}
  const ts=pcTrickSuit(pc);if(ts){doTrick(pc,ts,true);return;}
  const street=pcFindStreet(pc);if(street){setTimeout(()=>playStreet(street,pc,true),450);return;}
  let opt=pc.hand.filter(canPlay);
  if(opt.length===0){
    if(!G.drewThisTurn){sfxDraw();G.curDrew=(G.curDrew||0)+1;drawCards(pc,1);G.drewThisTurn=true;renderCounts();banner("Computer zieht eine Karte.");setTimeout(pcStep,650);return;}
    banner("Computer passt.");setTimeout(passTurnImmediate,500);return;
  }
  const score=c=>({"8":5,"7":4,"6":4,"B":1,"A":2}[c.rank]??3);opt.sort((a,b)=>score(b)-score(a));
  if(opt.length>1&&opt[0].rank==="B")opt.push(opt.shift());
  pcPlay(pc,opt[0]);
}
function pcPlay(pc,card){const idx=pc.hand.indexOf(card);pc.hand.splice(idx,1);G.discard.push(card);G.wish=null;G.curPlayed.push({suit:card.suit,rank:card.rank});sfxPlay();renderDiscard();renderCounts();setTimeout(()=>applyEffect(card,pc,true),420);}
function pcTrickSuit(pc){
  if(!canTrick(pc))return null;const suits=trickAceSuits(pc);const cnt={};pc.hand.forEach(c=>cnt[c.suit]=(cnt[c.suit]||0)+1);
  let best=null,bv=2;for(const s of suits){if(s!==effectiveSuit()&&(cnt[s]||0)>bv){bv=cnt[s];best=s;}}
  return best&&Math.random()<0.55?best:null;
}
function pcFindStreet(pc){
  const bubes=pc.hand.filter(c=>c.rank==="B");
  for(const suit of SUIT_KEYS){
    const map={};pc.hand.filter(c=>c.suit===suit&&c.rank!=="B").forEach(c=>map[RANK_ORDER.indexOf(c.rank)]=c);
    if(Object.keys(map).length<4)continue;
    for(let s=0;s<9;s++)for(const d of[1,-1]){
      const seq=[];let usedBube=false;
      for(let len=0;len<9;len++){const pos=((s+d*len)%9+9)%9;if(map[pos])seq.push(map[pos]);else if(!usedBube&&bubes.length){usedBube=true;seq.push(bubes[0]);}else break;}
      while(seq.length&&seq[seq.length-1].rank==="B"&&seq.length>4)seq.pop();
      if(seq.length>=4){if(startLegal(seq[0]))return seq;const rev=seq.slice().reverse();if(startLegal(rev[0]))return rev;}
    }
  }
  return null;
}

 "BUTTERBROT – Kurzregeln\n\n• Ziel: Als Erster alle Karten loswerden.\n• Lege gleicher Belag ODER gleicher Wert.\n\n"+
 "Sonderkarten:\n  6 → +1   7 → +2   8 → nochmal (decken)\n  Bube → Wild + Belag wünschen\n  Ass → Karte darunter klauen\n\n"+
 "STRASSEN: 5+ gleicher Belag, fortlaufend, Bube füllt 1 Lücke. Endet auf 8 → decken.\n\n"+
 "BOMBEN (💣): 4 gleiche Werte (1 Bube ok). Auf alles spielbar, +2 (6er=+3, 7er=+4). Nur Bombe kontert Bombe. Kann sogar einen Sieg abfangen!\n\n"+
 "TRICK (🎩): 8 + Bube + Ass → Belag wechseln UND Buben behalten.\n\n"+
 "• Zweitletzte Karte: 🧈 Butter\n• Letzte Karte: 🍞 Brot = Sieg!"
);
$("winAgain").onclick=()=>{const m=G?G.mode:"pc";newGame(m);};
$("winHome").onclick=()=>{G=null;stopConfetti();showScreen("home");$("board").style.display="none";};

/* ---------- Feier ---------- */
let confCtx,confParts=[],confRAF=null;
function celebrate(w){sfxWin();$("winTitle").textContent="🥪 "+w.name+" gewinnt!";
  const subs=["Belag oben, Sieg in der Tasche!","Knusprig durchgespielt!","Goldbraun und unbesiegbar!","Das war butterweich."];
  $("winSub").textContent=subs[Math.floor(Math.random()*subs.length)];showScreen("win");startConfetti();}
function startConfetti(){
  const cv=$("confetti");confCtx=cv.getContext("2d");const dpr=Math.min(devicePixelRatio||1,2);
  cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;confCtx.setTransform(dpr,0,0,dpr,0,0);
  const cols=["#ffd166","#ff7ea8","#7ed0ff","#9cff8f","#ffffff","#c9a24b"];confParts=[];
  for(let i=0;i<140;i++)confParts.push({x:Math.random()*innerWidth,y:Math.random()*-innerHeight,s:Math.random()*7+4,vx:(Math.random()-.5)*1.4,vy:Math.random()*2.4+1.6,rot:Math.random()*6.28,vr:(Math.random()-.5)*.3,col:cols[Math.floor(Math.random()*cols.length)],em:Math.random()<0.16?(Math.random()<.5?"🍞":"🧈"):null});
  cancelAnimationFrame(confRAF);
  (function loop(){confCtx.clearRect(0,0,innerWidth,innerHeight);
    for(const p of confParts){p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;if(p.y>innerHeight+20){p.y=-20;p.x=Math.random()*innerWidth;}
      confCtx.save();confCtx.translate(p.x,p.y);confCtx.rotate(p.rot);
      if(p.em){confCtx.font=p.s*2.4+"px serif";confCtx.textAlign="center";confCtx.fillText(p.em,0,0);}else{confCtx.fillStyle=p.col;confCtx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);}confCtx.restore();}
    confRAF=requestAnimationFrame(loop);})();
}
function stopConfetti(){cancelAnimationFrame(confRAF);}
addEventListener("resize",()=>{if(!$("win").classList.contains("hidden"))startConfetti();});

showScreen("home");$("board").style.display="none";
})();
